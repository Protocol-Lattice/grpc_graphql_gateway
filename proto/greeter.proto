syntax = "proto3";

package greeter;

import "graphql.proto";

message HelloRequest {
  // description: Name of the person to greet
  string name = 1 [(graphql.field) = {default: "World", description: "Name of the person to greet"}];
}

message HelloReply {
  // description: The greeting message
  string message = 1 [(graphql.field) = {description: "The greeting message"}];
  // description: Metadata about the greeting
  GreetMeta meta = 2 [(graphql.field) = {description: "Metadata about the greeting"}];
}

message UpdateGreetingRequest {
  // description: Name of the person to update the greeting for
  string name = 1 [(graphql.field) = {required: true, description: "Name of the person to update the greeting for"}];
  // description: The new greeting salutation to use
  string greeting = 2 [(graphql.field) = {required: true, name: "salutation", description: "The new greeting salutation to use"}];
}

message User {
  // description: Unique identifier of the user
  string id = 1 [(graphql.field) = {description: "Unique identifier of the user"}];
  // description: Human-readable display name
  string display_name = 2 [(graphql.field) = {name: "displayName", description: "Human-readable display name"}];
  // description: Whether this user is trusted
  bool trusted = 3 [(graphql.field) = {description: "Whether this user is trusted"}];
}

message GreetMeta {
  // description: Correlation ID for request tracing
  string correlation_id = 1 [(graphql.field) = {name: "correlationId", description: "Correlation ID for request tracing"}];
  // description: The user who sent the greeting
  User from = 2 [(graphql.field) = {description: "The user who sent the greeting"}];
}

message GetUserRequest {
  // description: ID of the user to retrieve
  string id = 1 [(graphql.field) = {required: true, description: "ID of the user to retrieve"}];
}

message UploadAvatarRequest {
  // description: ID of the user uploading an avatar
  string user_id = 1 [(graphql.field) = {required: true, name: "userId", description: "ID of the user uploading an avatar"}];
  // description: The avatar image data
  bytes avatar = 2 [(graphql.field) = {required: true, description: "The avatar image data"}];
}

message UploadAvatarReply {
  // description: ID of the user whose avatar was uploaded
  string user_id = 1 [(graphql.field) = {name: "userId", description: "ID of the user whose avatar was uploaded"}];
  // description: Size of the uploaded avatar in bytes
  uint64 size = 2 [(graphql.field) = {description: "Size of the uploaded avatar in bytes"}];
}

message UploadAvatarsRequest {
  // description: ID of the user uploading avatars
  string user_id = 1 [(graphql.field) = {required: true, name: "userId", description: "ID of the user uploading avatars"}];
  // description: List of avatar image data to upload
  repeated bytes avatars = 2 [(graphql.field) = {required: true, description: "List of avatar image data to upload"}];
}

message UploadAvatarsReply {
  // description: ID of the user whose avatars were uploaded
  string user_id = 1 [(graphql.field) = {name: "userId", description: "ID of the user whose avatars were uploaded"}];
  // description: Sizes of each uploaded avatar in bytes
  repeated uint64 sizes = 2 [(graphql.field) = {description: "Sizes of each uploaded avatar in bytes"}];
}

service Greeter {
  option (graphql.service) = {
    host: "http://127.0.0.1:50051"
    insecure: true
  };

  rpc SayHello(HelloRequest) returns (HelloReply) {
    option (graphql.schema) = {
      type: QUERY
      name: "hello"
      response { required: true }
    };
  }

  rpc UpdateGreeting(UpdateGreetingRequest) returns (HelloReply) {
    option (graphql.schema) = {
      type: MUTATION
      name: "updateGreeting"
      request { name: "input" }
      response { required: true }
    };
  }

  rpc StreamHellos(HelloRequest) returns (stream HelloReply) {
    option (graphql.schema) = {
      type: SUBSCRIPTION
      name: "streamHello"
    };
  }

  rpc ResolveUser(GetUserRequest) returns (User) {
    option (graphql.schema) = {
      type: RESOLVER
      name: "user"
      response { required: true }
    };
  }

  rpc UploadAvatar(UploadAvatarRequest) returns (UploadAvatarReply) {
    option (graphql.schema) = {
      type: MUTATION
      name: "uploadAvatar"
      request { name: "input" }
      response { required: true }
    };
  }

  rpc UploadAvatars(UploadAvatarsRequest) returns (UploadAvatarsReply) {
    option (graphql.schema) = {
      type: MUTATION
      name: "uploadAvatars"
      request { name: "input" }
      response { required: true }
    };
  }
}
